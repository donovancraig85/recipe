<!DOCTYPE html>
<html>
<head>
  <title>Recipe</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- PDF Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }
    h1 { margin-bottom: 10px; }
    h2 {
      margin-top: 25px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }
    ul { padding-left: 20px; }
    a.back-link {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: #0077cc;
      font-size: 16px;
    }
    .top-buttons { margin-bottom: 20px; }
    .top-buttons button,
    #delete-btn {
      padding: 10px 15px;
      margin-right: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }
    #pdf-btn { background-color: #0077cc; color: white; }
    #delete-btn {
      background-color: #cc0000;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <a href="index.html" class="back-link">← Back to Recipes</a>

  <div class="top-buttons">
    <button id="pdf-btn">Save as PDF</button>
  </div>

  <div id="recipe-card">
    <h1 id="recipe-title">Loading...</h1>

    <h2>Ingredients</h2>
    <ul id="ingredients-list"></ul>

    <h2>Directions</h2>
    <ol id="directions-list"></ol>
  </div>

  <button id="delete-btn">Delete Recipe</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD-ZVROybS5c3O6kJhe8LVcXNZ0KbYTmvg",
      authDomain: "recipes-83727.firebaseapp.com",
      projectId: "recipes-83727",
      storageBucket: "recipes-83727.appspot.com",
      messagingSenderId: "97445031584",
      appId: "1:97445031584:web:a463b119a272531f51a3c5",
      measurementId: "G-4LERX7EWB7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const recipeId = params.get("id");

    if (!recipeId) {
      document.getElementById("recipe-title").textContent = "Recipe not found.";
    } else {
      db.collection("recipes").doc(recipeId).get().then(doc => {
        if (!doc.exists) {
          document.getElementById("recipe-title").textContent = "Recipe not found.";
          return;
        }

        const data = doc.data();

        document.getElementById("recipe-title").textContent = data.name || "Untitled Recipe";

        const ingList = document.getElementById("ingredients-list");
        ingList.innerHTML = "";
        (data.ingredients || []).forEach(item => {
          const li = document.createElement("li");
          li.textContent = item;
          ingList.appendChild(li);
        });

        const dirList = document.getElementById("directions-list");
        dirList.innerHTML = "";
        (data.directions || []).forEach(step => {
          const li = document.createElement("li");
          li.textContent = step;
          dirList.appendChild(li);
        });

      });
    }

    document.getElementById("pdf-btn").addEventListener("click", () => {
      const element = document.getElementById("recipe-card");
      const title = document.getElementById("recipe-title").textContent || "recipe";
      html2pdf().from(element).save(`${title}.pdf`);
    });

    document.getElementById("delete-btn").addEventListener("click", () => {
      if (!confirm("Are you sure you want to delete this recipe?")) return;

      db.collection("recipes").doc(recipeId).delete()
        .then(() => {
          alert("Recipe deleted.");
          window.location.href = "index.html";
        });
    });
  </script>

</body>
</html>
