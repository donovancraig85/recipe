<html>
<head>
  <title>My Recipes</title>
  <link rel="stylesheet" href="style.css">

  <!-- PDF support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
  </script>

  <!-- DOCX support -->
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

  <!-- OCR for images -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    .search-dropdown {
      background: white;
      border: 1px solid #ccc;
      max-width: 300px;
      position: absolute;
      z-index: 10;
      display: none;
    }
    .search-dropdown div {
      padding: 8px;
      cursor: pointer;
    }
    .search-dropdown div:hover {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

  <h1>Recipes</h1>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search recipes...">
  <button id="search-btn">Search</button>

  <!-- Live search dropdown -->
  <div id="search-results" class="search-dropdown"></div>

  <!-- Upload -->
  <h3>Upload Recipe File</h3>
  <input type="text" id="upload-name" placeholder="Enter recipe name">
  <input type="text" id="upload-tags" placeholder="Enter tags (optional)">
  <input type="file" id="recipe-file">
  <button id="upload-btn">Upload Recipe</button>

  <!-- Recipe List -->
  <div id="recipe-list" class="card-grid"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    const db = firebase.firestore();

  <!-- App Logic -->
  <script src="app.js"></script>

</body>
</html>
